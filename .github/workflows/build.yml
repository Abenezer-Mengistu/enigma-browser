name: Build Enigma

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enigma-Windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Linux
        run: npm run build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enigma-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Clean stale DMG mounts
        run: |
          for vol in /Volumes/Enigma*; do
            [ -d "$vol" ] && hdiutil detach "$vol" -force || true
          done

      - name: Install dependencies
        run: npm install

      - name: Build macOS (zip only — DMG volumes conflict on CI when building both arches)
        run: npx electron-builder --mac zip --x64 --arm64 --publish never

      - name: Upload macOS artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Enigma-macOS
          path: dist/*.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate downloads manifest
        run: node scripts/generate-downloads-manifest.mjs

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloads-manifest
          path: website/downloads.json
          retention-days: 90

  deploy-website:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Wait for release assets to propagate
        run: node scripts/wait-for-release-assets.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Generate downloads manifest
        run: node scripts/generate-downloads-manifest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Generate analytics data
        run: node scripts/generate-analytics-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh site icons
        run: |
          mkdir -p website/assets/icons
          cp assets/icons/icon_32.png assets/icons/icon_64.png website/assets/icons/
          touch website/.nojekyll

      - uses: actions/configure-pages@v5

      - name: Wait for in-flight Pages deployments
        uses: softprops/turnstyle@v1
        with:
          poll-interval-seconds: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
