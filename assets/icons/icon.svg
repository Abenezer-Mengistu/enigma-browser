<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.45" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="shine" x1="256" y1="48" x2="256" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9d5ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c4b5fd" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <rect x="18" y="18" width="476" height="476" rx="98" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Privacy orbit arc -->
  <circle cx="256" cy="256" r="148" stroke="url(#ring)" stroke-width="10" stroke-linecap="round"
    stroke-dasharray="680 240" transform="rotate(-35 256 256)" opacity="0.85"/>

  <!-- Soft glow behind mark -->
  <ellipse cx="256" cy="268" rx="92" ry="78" fill="#ddd6fe" opacity="0.18" filter="url(#glow)"/>

  <!-- Stylized E -->
  <g fill="#ffffff">
    <rect x="178" y="148" width="28" height="216" rx="8"/>
    <rect x="178" y="148" width="156" height="28" rx="8"/>
    <rect x="178" y="242" width="124" height="24" rx="8"/>
    <rect x="178" y="336" width="156" height="28" rx="8"/>
  </g>

  <!-- Inner cut for depth -->
  <rect x="206" y="176" width="128" height="66" rx="6" fill="#7c3aed" opacity="0.22"/>
  <rect x="206" y="270" width="96" height="66" rx="6" fill="#7c3aed" opacity="0.18"/>
</svg>
